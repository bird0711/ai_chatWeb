{{ define "auth.html" }}
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Title }}</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <main class="auth-shell">
    <section class="auth-panel">
      <h1>AI 群聊</h1>
      {{ if eq .Mode "register" }}
        <p>创建账号后开始管理自己的 AI 群聊。</p>
      {{ else }}
        <p>登录后进入你的 AI 群聊工作区。</p>
      {{ end }}
      {{ if .Error }}<div class="alert error">{{ .Error }}</div>{{ end }}
      <form method="post" action="{{ .Action }}" class="stack-form">
        <input type="hidden" name="csrf_token" value="{{ $.CSRFToken }}">

        <label>
          <span>邮箱</span>
          <input name="email" type="email" required maxlength="255" value="{{ .Email }}" placeholder="you@example.com">
        </label>
        <label>
          <span>密码</span>
          <input name="password" type="password" required minlength="6" placeholder="至少 6 位">
        </label>
        <button type="submit">{{ if eq .Mode "register" }}注册并进入{{ else }}登录{{ end }}</button>
      </form>
      <div class="auth-switch">
        {{ if eq .Mode "register" }}
          已有账号？<a href="/login">去登录</a>
        {{ else }}
          没有账号？<a href="/register">创建账号</a>
        {{ end }}
      </div>
    </section>
  </main>
</body>
</html>
{{ end }}
