name: CI

on:
  push:
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check format
        run: |
          test -z "$(gofmt -l .)"

      - name: Run tests
        run: go test -mod=mod ./...

      - name: Run vet
        run: go vet ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m ./...

      - name: Build server
        run: |
          pwd
          ls -la
          ls -la cmd
          go build -mod=mod -buildvcs=false ./cmd/server/main.go

